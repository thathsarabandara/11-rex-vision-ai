name: REX Vision AI — CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  checkout:
    name: "1 · Checkout"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

  environment:
    name: "2 · Environment"
    runs-on: ubuntu-22.04
    needs: checkout
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Print environment versions
        run: |
          python3 --version
          pip3 --version
          docker --version

  install-dependencies:
    name: "3 · Install Dependencies"
    runs-on: ubuntu-22.04
    needs: environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

  lint:
    name: "4 · Lint"
    runs-on: ubuntu-22.04
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run lint
        run: |
          pip install ruff mypy
          ruff check app/ tests/
          ruff format --check app/ tests/

  test:
    name: "5 · Test"
    runs-on: ubuntu-22.04
    needs: lint
    env:
      APP_ENV: testing
      MYSQL_HOST: localhost
      MYSQL_PORT: 3306
      MYSQL_USER: rex
      MYSQL_PASSWORD: rex_test_password
      MYSQL_DATABASE: rex_vision_ai_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: rex_minio
      MINIO_SECRET_KEY: rex_minio_secret
      MINIO_SECURE: "false"
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      DEVICE: cpu
      USER_JWT_SECRET_KEY: test-secret-key-for-ci
      USER_JWT_ISSUER: rex-auth-service
      USER_JWT_AUDIENCE: rex-platform
      INTERNAL_SERVICE_TOKEN: test-internal-token
      ROBOT_SERVICE_URL: http://localhost:8003
      OBJECT_MODEL_PATH: yolov8n.pt
      FACE_MODEL_NAME: buffalo_sc
      EXPRESSION_MODEL_PATH: models/expression.onnx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libsm6 libxrender1 libxext6 libgl1-mesa-glx
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run test suite
        run: |
          pytest tests/ \
            --asyncio-mode=auto \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90 \
            -v

  build:
    name: "6 · Build"
    runs-on: ubuntu-22.04
    needs: [ lint, test ]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

  push:
    name: "7 · Push"
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=main
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
